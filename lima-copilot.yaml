minimumLimaVersion: 2.0.0

base:
  - template:_images/ubuntu-lts

containerd:
  system: false
  user: false

mounts:
  - location: "~/.ai-box/{{.Name}}/.copilot"
    mountPoint: "/home/{{.User}}.guest/.copilot"
    writable: true

portForwards:
  - guestPortRange: [1024, 65535]
    hostPortRange: [1024, 65535]

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y ca-certificates curl git openssh-client sudo
  - mode: user
    script: |
      #!/bin/bash
      set -euxo pipefail
      export PROFILE="$HOME/.bashrc"
      export NVM_DIR="$HOME/.nvm"
      curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.4/install.sh | bash
      \. "$NVM_DIR/nvm.sh"
      nvm install 24
      npm install -g --include=optional @github/copilot

ssh:
  forwardAgent: true
